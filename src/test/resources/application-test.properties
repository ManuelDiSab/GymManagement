spring.application.name=GymManagment-Test

# Database H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
# Usa il dialetto corretto per H2 (Spring Boot 3+ lo rileva da solo, ma forzarlo aiuta)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# IMPORTANTE: Copia i parametri JWT anche qui!
app.jwt-secret=secretkeysecretkeysecretkeysecretkeysecretkeysecretkeysecretkeysecretkey
app.jwt-expiration-milliseconds=86400000

# Parametri SuperAdmin per i test
user.admin.username=AldoApache
user.admin.password=admin
user.admin.email=e.gorlomi@mail.com

# Mostra i log delle query per capire cosa succede
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true